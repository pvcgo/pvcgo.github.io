<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>FIFA WORLD CUP 2026</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<!-- ========================================================= -->
<!-- BACKGROUND SVG -->
<!-- ========================================================= -->

<svg id="bg" viewBox="0 0 1920 1080" preserveAspectRatio="none">

<defs>

<linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">

<stop offset="0%" stop-color="#081326"/>
<stop offset="45%" stop-color="#111f46"/>
<stop offset="100%" stop-color="#071118"/>

</linearGradient>

<radialGradient id="redGlow">

<stop offset="0%" stop-color="#ff0048" stop-opacity=".45"/>
<stop offset="100%" stop-color="#ff0048" stop-opacity="0"/>

</radialGradient>

<radialGradient id="blueGlow">

<stop offset="0%" stop-color="#00b7ff" stop-opacity=".45"/>
<stop offset="100%" stop-color="#00b7ff" stop-opacity="0"/>

</radialGradient>

<filter id="blur">

<feGaussianBlur stdDeviation="120"/>

</filter>

</defs>

<rect width="100%" height="100%" fill="url(#bgGradient)"/>

<circle
cx="300"
cy="200"
r="350"
fill="url(#redGlow)"
filter="url(#blur)"
/>

<circle
cx="1600"
cy="300"
r="420"
fill="url(#blueGlow)"
filter="url(#blur)"
/>

</svg>

<!-- ========================================================= -->
<!-- MAIN -->
<!-- ========================================================= -->

<div id="page">

<header>

<div class="logoArea">

<div class="logo">

🏆

</div>

<div>

<h1>

FIFA WORLD CUP

</h1>

<h2>

2026

</h2>

<p>

UNITED STATES • CANADA • MEXICO

</p>

</div>

</div>

<div class="clockPanel">

<div id="clock">

00:00:00

</div>

<div id="today">

01/01/2026

</div>

<div id="lastUpdate">

Updating...

</div>

</div>

</header>

<!-- ========================================================= -->

<main id="bracket">

<section class="round">

<h3>

ROUND OF 16

</h3>

<div id="round16">

</div>

</section>

<section class="round">

<h3>

QUARTER FINALS

</h3>

<div id="quarter">

</div>

</section>

<section class="round">

<h3>

SEMI FINALS

</h3>

<div id="semi">

</div>

</section>

<section class="round">

<h3>

FINAL

</h3>

<div id="final">

</div>

</section>

</main>

<footer>

<div>

LIVE SCORE

</div>

<div>

Auto refresh every 5 minutes

</div>

<div>

Powered by Football API

</div>

</footer>

</div>

<script src="api.js"></script>

<script src="render.js"></script>

<script src="app.js"></script>

</body>

</html>
