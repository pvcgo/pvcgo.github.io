*/

          function themTranDau(vongDau, stt, x, y, tranDau, fill_opacity=0.2,stroke="white",w = 200, h = 140)
          {
            const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");

            rect.setAttribute("y", y);

            rect.setAttribute("stroke", stroke);
            rect.setAttribute("stroke-width", 3);
            rect.setAttribute("stroke-opacity", 0.6);
            rect.setAttribute("height", h);
            rect.setAttribute("fill", "black");
            rect.setAttribute("rx", 8);
            rect.setAttribute("ry", 8);
            rect.setAttribute("fill-opacity",fill_opacity);
            svg.appendChild(rect);

            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            let urlA = "https://pvcgo.github.io/wc/blank.svg";
            let nameA = "---";
            let pointA = "-";
            if (tranDau.quocGiaAId !== null)
            {
              let qg = quocGiaMap.get(tranDau.quocGiaAId);
              urlA = qg.flagUrl;
              nameA = qg.name;
            }

            if (tranDau.diemSoQuocGiaA !== null)
            {
              pointA = tranDau.diemSoQuocGiaA;
            }

            let urlB = "https://pvcgo.github.io/wc/blank.svg";
            let nameB = "---";
            let pointB = "-";
            if (tranDau.quocGiaBId !== null)
            {
              let qg = quocGiaMap.get(tranDau.quocGiaBId);
              urlB = qg.flagUrl;
              nameB = qg.name;
            }

            if (tranDau.diemSoQuocGiaB !== null)

              pointB = tranDau.diemSoQuocGiaB;
            }

            g.innerHTML = `
                <text id="${vongDau}_${stt}_thoiGian" x="${x+42}" y="${y+24}" fill="white" font-size="16" font-weight="bold">${tranDau.thoiGian}</text>

                <image id="${vongDau}_${stt}_a_image" href="${urlA}" x="${x+6}" y="${y+40}" width="38" height="28"/>

                <text id="${vongDau}_${stt}_a_text" x="${x+60}" y="${y+60}" fill="white" font-size="20" font-weight="bold">${nameA}</text>

            `;

          for (let i=1; i<=4; i++)

    <script>
      

      function loadDanhSachTranDauSapToi()
      {
        
        let dsHnayHTML = '';
        let dsNMaiHTML = '';


        for (let j =0; j < danhSachVongDau.length; j++)
        {
          for (let i =0; i < danhSachVongDau[j].danhSachTranDau.length; i++)
          {
            if (dangDienRa(danhSachVongDau[j].danhSachTranDau[i]))
            {
              dsHnayHTML += danhSachVongDau[j].danhSachTranDau[i].renderDanhSachGanDay(1);
            }
            else if (homNay(danhSachVongDau[j].danhSachTranDau[i]))
            {
              dsHnayHTML += danhSachVongDau[j].danhSachTranDau[i].renderDanhSachGanDay();
            }
            else if (ngayMai(danhSachVongDau[j].danhSachTranDau[i]))
            {
              dsNMaiHTML += danhSachVongDau[j].danhSachTranDau[i].renderDanhSachGanDay();
            }
          }
        }

        if (dsHnayHTML !== '')
        {
          document.getElementById('danhSachTranDauHomNay').innerHTML = dsHnayHTML;
        }
        else
        {
          document.getElementById('danhSachTranDauHomNay').innerHTML = "<i>không có trận nào</i>";
        }

        if (dsNMaiHTML !== '')
        {
          document.getElementById('danhSachTranDauNgayMai').innerHTML = dsNMaiHTML;
        }
        else
        {
          document.getElementById('danhSachTranDauNgayMai').innerHTML = "<i>không có trận nào</i>";
        }
        
        
      }

      function dangDienRa(tranDau)
      {
        let nows = new Date();
        let ngay = parseInt(nows.getDate());          // 1-31
        let thang = parseInt(nows.getMonth() + 1);    // 1-12 (phải +1)
        let gio = nows.getHours();      // 0 - 23
        let phut = nows.getMinutes();  // 0 - 59
        
        let tg = tranDau.thoiGian;
        let month = parseInt(tg.substr(3,5));
        let date = parseInt(tg.substr(0,2));
        let hour = parseInt(tg.substr(6,8));
        let minute = parseInt(tg.substr(9,11));

        if (
          (thang == month && ngay == date &&
             ((gio == hour && phut >= minute) || (gio == hour + 1 && phut + 60 - minute < 105) || (gio == hour + 2 && phut + 60 + 60 - minute < 105)))
             ||
              (thang == month && ngay == date + 1 &&
             ((hour== 23 && gio == 0 && phut + 60 - minute < 105) || (hour== 23 && gio == 1 && phut + 60 + 60 - minute < 105) || (hour== 22 && gio == 0 && phut + 60 + 60 - minute < 105)))
            )
        {
          return true;
        }
        else
        {
          return false;
        }
      }

      function homNay(tranDau)
      {
        let nows = new Date();
        let ngay = parseInt(nows.getDate());          // 1-31
        let thang = parseInt(nows.getMonth() + 1);    // 1-12 (phải +1)
        let tg = tranDau.thoiGian;
        let month = parseInt(tg.substr(3,5));
        let date = parseInt(tg.substr(0,2));

        if (thang == month && ngay == date)
        {
          return true;
        }
        else
        {
          return false;
        }
      }


      function ngayMai(tranDau)
      {
        let nows = new Date();
        let ngay = parseInt(nows.getDate());          // 1-31
        let thang = parseInt(nows.getMonth() + 1);    // 1-12 (phải +1)
        let tg = tranDau.thoiGian;
        let month = parseInt(tg.substr(3,5));
        let date = parseInt(tg.substr(0,2));

        if (thang == month && ngay + 1 == date)
        {
          return true;
        }
        else
        {
          return false;
        }
      }

      loadDanhSachTranDauSapToi();
    </script>

          <div class="final-time" id="finalTime">07:00</div>
          <div class="final-teams" id="finalTeams"></div>
          <div class="venue" id="finalVenue">MetLife Stadium<small>New Jersey, USA</small></div>
        </article>

        <section class="final-card">
          <div class="stage-label">Bán kết</div>
          <div class="semi-row" id="semiMatches"></div>
        </section>

        <article class="third-card">
          <div class="stage-label">Tranh hạng 3</div>
          <div id="thirdMatch"></div>
        </article>
      </section>

      <section class="column right-qf right-side" aria-label="Tứ kết nhánh phải">
        <div></div>
        <div class="stage-label">Tứ kết</div>
        <div id="rightQf"></div>
        <div></div>
      </section>

      <section class="column right-32 right-side" aria-label="Vòng 1/16 nhánh phải">
        <div class="stage-label">Vòng 1/16</div>
        <div id="right32"></div>
      </section>
    </section>

    <form class="top-config" style="display: none;">
      <label>
        API token miễn phí
        <input id="apiToken" type="password" autocomplete="off" placeholder="Dán X-Auth-Token từ football-data.org">
      </label>
      <button id="saveToken" type="button">Lưu token</button>
      <button id="refreshNow" class="secondary" type="button">Cập nhật</button>
    </form>

    <p class="status-bar" id="notice" style="display: none;">
      Dùng token miễn phí tại <a href="https://www.football-data.org/client/register" target="_blank" rel="noreferrer">football-data.org</a>. Dữ liệu tự cập nhật mỗi 5 phút.
    </p>




  <script>
    const API_URL = "https://api.football-data.org/v4/competitions/WC/matches?season=2026";
    const REFRESH_MS = 50 * 60 * 1000;
    const STORAGE_KEY = "wc2026_football_data_token";

    const STAGES = [
      { key: "LAST_32", aliases: ["LAST_32", "ROUND_OF_32", "R32"] },
      { key: "LAST_16", aliases: ["LAST_16", "ROUND_OF_16", "R16"] },
      { key: "QUARTER_FINALS", aliases: ["QUARTER_FINALS", "QUARTER_FINAL", "QF"] },
      { key: "SEMI_FINALS", aliases: ["SEMI_FINALS", "SEMI_FINAL", "SF"] },
      { key: "THIRD_PLACE", aliases: ["THIRD_PLACE", "THIRD_PLACE_PLAYOFF"] },
      { key: "FINAL", aliases: ["FINAL"] }
    ];

    const KNOCKOUT_STAGE_KEYS = new Set(STAGES.flatMap((stage) => stage.aliases));
    const KNOCKOUT_START = new Date("2026-06-28T00:00:00Z").getTime();
    const state = {
      token: localStorage.getItem(STORAGE_KEY) || "",
      matches: [],
      nextRefreshAt: null,
      refreshTimer: null,
      countdownTimer: null
    };

    const els = {
      token: document.querySelector("#apiToken"),
      saveToken: document.querySelector("#saveToken"),
      refreshNow: document.querySelector("#refreshNow"),
      notice: document.querySelector("#notice"),
      left32: document.querySelector("#left32"),
      right32: document.querySelector("#right32"),
      leftQf: document.querySelector("#leftQf"),
      rightQf: document.querySelector("#rightQf"),
      semi: document.querySelector("#semiMatches"),
      third: document.querySelector("#thirdMatch"),
      finalTeams: document.querySelector("#finalTeams"),
      finalDate: document.querySelector("#finalDate"),
      finalTime: document.querySelector("#finalTime"),
      finalVenue: document.querySelector("#finalVenue"),
      today: document.querySelector("#todayMetric"),
      clock: document.querySelector("#clockMetric")
    };

    els.token.value = state.token;
    render();
    startClock();

    if (state.token) {
      fetchMatches();
    }

    els.saveToken.addEventListener("click", () => {
      state.token = els.token.value.trim();
      if (state.token) {
        localStorage.setItem(STORAGE_KEY, state.token);
        setNotice("Đã lưu token. Đang tải dữ liệu World Cup 2026...");
        fetchMatches();
      } else {
        localStorage.removeItem(STORAGE_KEY);
        state.matches = [];
        clearTimeout(state.refreshTimer);
        clearInterval(state.countdownTimer);
        setNotice("Đã xoá token. Dán X-Auth-Token để bật cập nhật online.");
        render();
      }
    });

    els.refreshNow.addEventListener("click", fetchMatches);

    async function fetchMatches() {
      if (!state.token) {
        setNotice("Bạn cần token miễn phí của football-data.org trước khi lấy lịch và kết quả online.");
        render();
        return;
      }

      els.refreshNow.disabled = true;
      setNotice("Đang cập nhật dữ liệu online từ football-data.org...");

      try {
        const response = await fetch(API_URL, {
          headers: {
            "X-Auth-Token": state.token,
            "X-Unfold-Goals": "true"
          }
        });

        if (!response.ok) {
          const body = await safeJson(response);
          const message = body && (body.message || body.error) ? `: ${body.message || body.error}` : "";
          throw new Error(`API trả về HTTP ${response.status}${message}`);
        }

        const data = await response.json();
        state.matches = (data.matches || [])
          .filter(isKnockoutMatch)
          .sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));

        setNotice(`Đã cập nhật ${state.matches.length} trận knockout. Tự làm mới sau 5 phút.`);
        render();
      } catch (error) {
        setNotice(`Không lấy được dữ liệu: ${error.message}. Kiểm tra token, quota hoặc quyền truy cập World Cup.`);
        render();
      } finally {
        els.refreshNow.disabled = false;
        scheduleRefresh();
      }
    }

    function scheduleRefresh() {
      clearTimeout(state.refreshTimer);
      clearInterval(state.countdownTimer);
      state.nextRefreshAt = Date.now() + REFRESH_MS;
      state.refreshTimer = setTimeout(fetchMatches, REFRESH_MS);
      state.countdownTimer = setInterval(() => {
        const remaining = Math.max(0, state.nextRefreshAt - Date.now());
        const minutes = Math.floor(remaining / 60000);
        const seconds = Math.floor((remaining % 60000) / 1000);
        if (state.token) setNotice(`Dữ liệu online. Lượt cập nhật tiếp theo sau ${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}.`);
      }, 1000);
    }

    function startClock() {
      const tick = () => {
        const now = new Date();
        els.today.textContent = new Intl.DateTimeFormat("vi-VN", {
          day: "2-digit",
          month: "2-digit",
          year: "numeric"
        }).format(now);
        els.clock.textContent = new Intl.DateTimeFormat("vi-VN", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false
        }).format(now);
      };
      tick();
      setInterval(tick, 1000);
    }

    function render() {
      const grouped = groupMatches(state.matches);
      renderList(els.left32, take(grouped.LAST_32, 0, 8), 8, "left-side");
      renderList(els.right32, take(grouped.LAST_32, 8, 16), 8, "right-side");
      renderList(els.leftQf, take(grouped.QUARTER_FINALS, 0, 2), 2, "left-side");
      renderList(els.rightQf, take(grouped.QUARTER_FINALS, 2, 4), 2, "right-side");
      renderSemi(grouped.SEMI_FINALS);
      renderThird(grouped.THIRD_PLACE[0]);
      renderFinal(grouped.FINAL[0]);
    }

    function groupMatches(matches) {
      const grouped = {
        LAST_32: [],
        LAST_16: [],
        QUARTER_FINALS: [],
        SEMI_FINALS: [],
        THIRD_PLACE: [],
        FINAL: []
      };
      for (const match of matches) {
        const key = getStageKey(match);
        if (grouped[key]) grouped[key].push(match);
      }
      return grouped;
    }

    function take(items, start, end) {
      return items.slice(start, end);
    }

    function renderList(target, matches, count, sideClass) {
      target.innerHTML = "";
      for (let index = 0; index < count; index += 1) {
        target.appendChild(renderMatch(matches[index], sideClass));
      }
    }

    function renderSemi(matches) {
      els.semi.innerHTML = "";
      for (let index = 0; index < 2; index += 1) {
        const wrapper = document.createElement("div");
        wrapper.className = "semi-card";
        wrapper.appendChild(renderMatch(matches[index], ""));
        els.semi.appendChild(wrapper);
      }
    }

    function renderThird(match) {
      els.third.innerHTML = "";
      els.third.appendChild(renderMatch(match, ""));
    }

    function renderFinal(match) {
      const finalDate = match ? new Date(match.utcDate) : new Date("2026-07-19T00:00:00Z");
      els.finalDate.textContent = formatDate(finalDate);
      els.finalTime.textContent = formatTime(finalDate);
      els.finalVenue.innerHTML = `${escapeHtml(match && match.venue ? match.venue : "MetLife Stadium")}<small>New Jersey, USA</small>`;

      const home = match && match.homeTeam ? match.homeTeam : {};
      const away = match && match.awayTeam ? match.awayTeam : {};
      const score = match && match.score ? match.score : {};
      const fullTime = score.fullTime || {};
      els.finalTeams.innerHTML = `
        ${shield(home.shortName || home.name || "TBD", home.crest, fullTime.home)}
        <div class="versus">${scoreText(fullTime.home, fullTime.away)}</div>
        ${shield(away.shortName || away.name || "TBD", away.crest, fullTime.away)}
      `;
    }

    function shield(name, crest, score) {
      return `
        <div class="shield">
          <div class="shield-icon">${crest ? `<img src="${escapeHtml(crest)}" alt="">` : "?"}</div>
          <span>${escapeHtml(name)}${score != null ? ` (${score})` : ""}</span>
        </div>
      `;
    }

    function renderMatch(match, sideClass) {
      const card = document.createElement("article");
      const status = String(match && match.status ? match.status : "SCHEDULED").toUpperCase();
      card.className = `match-card ${sideClass || ""} ${status === "IN_PLAY" || status === "PAUSED" ? "live" : ""} ${status === "FINISHED" ? "finished" : ""}`;

      if (!match) {
        card.innerHTML = `
          <div class="match-time">--/-- | --:--</div>
          ${teamRow({ name: "TBD" }, null)}
          ${teamRow({ name: "TBD" }, null)}
        `;
        return card;
      }

      const home = match.homeTeam || {};
      const away = match.awayTeam || {};
      const score = match.score || {};
      const fullTime = score.fullTime || {};
      const penalties = score.penalties || {};
      const homeScore = formatScore(fullTime.home, penalties.home);
      const awayScore = formatScore(fullTime.away, penalties.away);
      const date = new Date(match.utcDate);

      card.innerHTML = `
        <div class="match-time">${formatDate(date)} | ${formatTime(date)}</div>
        ${teamRow(home, homeScore)}
        ${teamRow(away, awayScore)}
      `;
      return card;
    }

    function teamRow(team, score) {
      const name = team.shortName || team.name || "TBD";
      const crest = team.crest || "";
      return `
        <div class="team">
          <span class="flag">${crest ? `<img src="${escapeHtml(crest)}" alt="">` : "•"}</span>
          <span class="team-name">${escapeHtml(name)}</span>
          <span class="score">${score ?? "-"}</span>
        </div>
      `;
    }

    function formatScore(score, penalties) {
      if (score == null) return null;
      if (penalties != null) return `${score}(${penalties})`;
      return String(score);
    }

    function scoreText(home, away) {
      if (home == null && away == null) return "-";
      return `${home ?? "-"} - ${away ?? "-"}`;
    }

    function isKnockoutMatch(match) {
      const stage = normalizeStage(match.stage);
      const date = new Date(match.utcDate).getTime();
      return KNOCKOUT_STAGE_KEYS.has(stage) || date >= KNOCKOUT_START;
    }

    function normalizeStage(stage) {
      return String(stage || "").toUpperCase().replaceAll("-", "_").replaceAll(" ", "_");
    }

    function getStageKey(match) {
      const normalized = normalizeStage(match.stage);
      const found = STAGES.find((stage) => stage.aliases.includes(normalized));
      if (found) return found.key;

      const date = new Date(match.utcDate).getTime();
      if (date >= new Date("2026-07-19T00:00:00Z").getTime()) return "FINAL";
      if (date >= new Date("2026-07-18T00:00:00Z").getTime()) return "THIRD_PLACE";
      if (date >= new Date("2026-07-14T00:00:00Z").getTime()) return "SEMI_FINALS";
      if (date >= new Date("2026-07-09T00:00:00Z").getTime()) return "QUARTER_FINALS";
      if (date >= new Date("2026-07-04T00:00:00Z").getTime()) return "LAST_16";
      return "LAST_32";
    }

    function formatDate(date) {
      if (Number.isNaN(date.getTime())) return "--/--";
      return new Intl.DateTimeFormat("vi-VN", {
        day: "2-digit",
        month: "2-digit"
      }).format(date);
    }

    function formatTime(date) {
      if (Number.isNaN(date.getTime())) return "--:--";
      return new Intl.DateTimeFormat("vi-VN", {
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).format(date);
    }

    function setNotice(message) {
      els.notice.innerHTML = `${escapeHtml(message)} Nguồn: <a href="https://www.football-data.org/" target="_blank" rel="noreferrer">football-data.org</a>.`;
    }

    async function safeJson(response) {
      try {
        return await response.json();
      } catch (_) {
        return null;
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
